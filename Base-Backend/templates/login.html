{% extends "base.html" %}

{% block title %}Log In - FindMeWriter{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4">
      <h1 class="h3 fw-bold text-center mb-4">Log In to Your Account</h1>
      
      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" name="email" required autocomplete="email" aria-describedby="emailHelp">
          <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
        </div>
        
        <div id="error-message" class="alert alert-danger d-none" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="fa-solid fa-right-to-bracket me-2" aria-hidden="true"></i>Log In
        </button>
      </form>
      
      <div class="text-center mt-4">
        <p class="text-muted small">Don't have an account? <a href="/register">Register here</a></p>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('login-form');
    const errMsg = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errMsg.classList.add('d-none');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Set JWT cookies for server-side page templates
          document.cookie = `access_token=${data.access_token}; path=/; max-age=3600; SameSite=Lax`;
          document.cookie = `refresh_token=${data.refresh_token}; path=/; max-age=604800; SameSite=Lax`;
          
          window.location.href = '/dashboard';
        } else {
          errMsg.textContent = data.error || 'Invalid credentials. Please try again.';
          errMsg.classList.remove('d-none');
        }
      } catch (err) {
        console.error(err);
        errMsg.textContent = 'A network error occurred. Please try again.';
        errMsg.classList.remove('d-none');
      }
    });
  });
</script>
{% endblock %}
